<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nest mark & grocery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- sign -->
        <div class="sign">
            <ul class="sign__ul">
                <li class="sign__ul--li">About Us</li>

                <img src="image/Vertical Divider.png" alt="Vertical">

                <li class="sign__ul--li">My Account</li>

                <img src="image/Vertical Divider.png" alt="Vertical">

                <li class="sign__ul--li">Wishlist</li>

                <img src="image/Vertical Divider.png" alt="Vertical">

                <li class="sign__ul--li">Order Tracking</li>
            </ul>

            <p class="sign__paragrf">100% Secure delivery without contacting the courier</p>

            <ul class="sign__ul">
                <li class="sign__ul--li">Need help? Call Us: <span>+1800900122</span></li>

                <img src="image/Vertical Divider.png" alt="Vertical">

                <li class="sign__ul--li">English <img src="icon/Vector.png" alt="Vector"></li>

                <img src="image/Vertical Divider.png" alt="Vertical">
                
                <li class="sign__ul--li">INR <img src="icon/Vector.png" alt="Vector"></li>
            </ul>
        </div>
        <hr>


        <!-- header -->
        <header class="header">
            <div class="header__flex">
                <img src="image/Nest.png" alt="Nest">

                <div class="header__flex--box">
                    <input id="input" type="text" placeholder="Search for products...">

                    <button class="header__flex--box--btn">Search</button>
                </div>
            </div>

            
            <div class="header__flex2">

                <button class="header__icon">Became Vendor <img src="icon/Vector (1).png" alt="Vector"></button>


                <ul class="header__flex2--ul">
                    <li class="header__flex2--ul--li">Compare<img src="icon/Group.png" alt="icon"></li>
                    
                    <li class="header__flex2--ul--li">Wishlist<img src="" alt="icon"></li>

                    <li class="header__flex2--ul--li">Cart<img src="" alt="icon"></li>

                    <li class="header__flex2--ul--li">Account<img src="" alt="icon"></li>
                </ul>
            </div>

        </header>

    </div>
    <script src="js/index.js"></script>
</body>
</html>
